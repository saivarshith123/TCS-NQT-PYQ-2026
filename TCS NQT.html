<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS NQT 2026 | Ultra-Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030303;
            --accent: #00f2fe;
            --accent-2: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            /* FIXED SCROLLING: Changed from hidden to auto */
            overflow-x: hidden;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fixed Background Elements */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(339,49%,30%,1) 0, transparent 50%);
            filter: blur(60px);
            opacity: 0.7;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
            z-index: -1;
            opacity: 0.2;
        }

        /* Container & Header */
        .container {
            width: 90%;
            max-width: 1200px;
            padding: 80px 0;
            text-align: center;
            position: relative;
        }

        header { margin-bottom: 60px; }

        header h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff 40%, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            opacity: 0.8;
        }

        /* PORTAL GRID */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 50px; /* Space at bottom */
        }

        .nav-card {
            position: relative;
            text-decoration: none;
            color: white;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 50px 30px;
            border-radius: 28px;
            backdrop-filter: blur(15px);
            transition: border 0.3s, transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d; /* For 3D Tilt */
        }

        .nav-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
        }

        /* Inner card elements with 3D Pop */
        .date-tag {
            font-size: 0.7rem;
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            transform: translateZ(20px);
        }

        .shift-name {
            font-size: 1.8rem;
            font-weight: 700;
            transform: translateZ(40px);
        }

        .btn-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #777;
            transform: translateZ(30px);
        }

        /* Mouse Glow Filter */
        #cursor-blur {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div class="grid-overlay"></div>
    <div id="cursor-blur"></div>

    <div class="container">
        <header>
            <p class="subtitle">Secure Examination Archive</p>
            <h1>TCS NQT 2026</h1>
        </header>

        <div class="portal-grid">
            <a href="https://www.notion.so/20-Th-March-2026-shift-1-3290a0121cbb80fbb31fdfe1fdbf0abf" target="_blank" class="nav-card" data-tilt>
                <div class="date-tag">MARCH 20, 2026</div>
                <div class="shift-name">Shift 01</div>
                <div class="btn-text">Open Database →</div>
            </a>

            <a href="https://www.notion.so/20th-March-shift2-3290a0121cbb806c8c61f68b28775130" target="_blank" class="nav-card" data-tilt>
                <div class="date-tag">MARCH 20, 2026</div>
                <div class="shift-name">Shift 02</div>
                <div class="btn-text">Open Database →</div>
            </a>

            <a href="https://www.notion.so/21st-March-Shift-1-Questions-32a0a0121cbb802c938fc51da5b08304" target="_blank" class="nav-card" data-tilt>
                <div class="date-tag">MARCH 21, 2026</div>
                <div class="shift-name">Shift 01</div>
                <div class="btn-text">Open Database →</div>
            </a>

            <a href="https://www.notion.so/21st-March-Shift-2-32a0a0121cbb802fadc1f5ba2656d035" target="_blank" class="nav-card" data-tilt>
                <div class="date-tag">MARCH 21, 2026</div>
                <div class="shift-name">Shift 02</div>
                <div class="btn-text">Open Database →</div>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script>
        // Initialize 3D Tilt
        VanillaTilt.init(document.querySelectorAll(".nav-card"), {
            max: 15,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });

        // Mouse Follow Effect
        const cursor = document.getElementById('cursor-blur');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Entry Animation
        window.addEventListener('load', () => {
            document.querySelectorAll('.nav-card').forEach((card, i) => {
                card.animate([
                    { opacity: 0, transform: 'translateY(30px)' },
                    { opacity: 1, transform: 'translateY(0)' }
                ], {
                    duration: 600,
                    delay: i * 150,
                    fill: 'forwards',
                    easing: 'cubic-bezier(0.23, 1, 0.32, 1)'
                });
            });
        });
    </script>
</body>
</html>
